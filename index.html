<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake App</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#16a34a">
    
    <link rel="icon" href="icon.png" type="image/png">
    
    <link rel="stylesheet" href="style.css">
</head><body>
    <div class="game-container">
        <h1>ניקוד: <span id="score">0</span></h1>
        
        <div id="grid"></div>

        <div class="controls">
            <button class="arrow" onclick="changeDir(-20)">↑</button><br>
            <button class="arrow" onclick="changeDir(-1)">←</button>
            <button class="arrow" onclick="changeDir(20)">↓</button>
            <button class="arrow" onclick="changeDir(1)">→</button>
        </div>

        <button id="start-btn" onclick="startGame()">התחל משחק</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
