<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake App</title>
    <meta name="theme-color" content="#16a34a">
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="snake app" />
    <link rel="manifest" href="favicon/site.webmanifest" />
    
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="leaderboard" style="margin-top: 20px;">
        <h3>🏆 טבלת 3 שיאים</h3>
        <ul id="scoreList">
        </ul>
    </div>
    <div class="game-container">
        <h1>ניקוד: <span id="score">0</span></h1>
        
        <div id="grid"></div>

       <!-- <div class="controls">
            <button class="arrow" onclick="changeDir(-20)">↑</button><br>
            <button class="arrow" onclick="changeDir(-1)">→</button>
            <button class="arrow" onclick="changeDir(20)">↓</button>
            <button class="arrow" onclick="changeDir(1)">←</button>
        </div> -->
        <!--trying.....-->
        <!--trying.....-->
        <!--trying.....-->
        <button id="start-btn" onclick="startGame()">התחל משחק</button>
        <button id="end-btn" onclick="endGame()">סיים משחק</button>
    </div>
    <script src="script.js"></script>
    <div id="scoreModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index:1000; text-align:center;">
        <h3>Game Over! Save your score</h3>
        <input type="text" id="firstName" placeholder="First Name" required><br><br>
        <input type="text" id="lastName" placeholder="Last Name" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <p>Your Score: <span id="finalScoreDisplay">0</span></p>
        <button onclick="submitScore()" style="padding:10px 20px; cursor:pointer; background:#2ecc71; color:white; border:none; border-radius:5px;">Submit Score</button>
        <br/>
        <button onclick="(() => document.getElementById('scoreModal').style.display = 'none')()" 
        style="padding:10px 20px; cursor:pointer; background:#95a5a6; color:white; border:none; border-radius:5px;"> Skip
        </button>
    </div>
  </body>
</html>
