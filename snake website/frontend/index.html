<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake App</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#16a34a">
    
    <link rel="icon" href="icon.png" type="image/png">
    
    <link rel="stylesheet" href="style.css">
</head><body>
    <div class="game-container">
        <h1>ניקוד: <span id="score">0</span></h1>
        
        <div id="grid"></div>

        <div class="controls">
            <button class="arrow" onclick="changeDir(-20)">↑</button><br>
            <button class="arrow" onclick="changeDir(-1)">←</button>
            <button class="arrow" onclick="changeDir(20)">↓</button>
            <button class="arrow" onclick="changeDir(1)">→</button>
        </div>

        <button id="start-btn" onclick="startGame()">התחל משחק</button>
    </div>
    <script src="script.js"></script>
    <div id="scoreModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index:1000; text-align:center;">
    <h3>Game Over! Save your score</h3>
    <input type="text" id="firstName" placeholder="First Name" required><br><br>
    <input type="text" id="lastName" placeholder="Last Name" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <p>Your Score: <span id="finalScoreDisplay">0</span></p>
    <button onclick="submitScore()" style="padding:10px 20px; cursor:pointer; background:#2ecc71; color:white; border:none; border-radius:5px;">Submit Score</button>
</div>

<div id="leaderboard" style="margin-top: 20px;">
    <h3>🏆 Top 10 Global High Scores</h3>
    <ul id="scoreList">
        </ul>
</div>
</body>
</html>
